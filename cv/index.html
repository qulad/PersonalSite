<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><style>rect{fill:%23060607}text{fill:%23c8a96e}@media(prefers-color-scheme:light){rect{fill:%23fafaf8}text{fill:%239b7840}}</style><rect width='32' height='32' rx='7'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='21' font-weight='400'>q</text></svg>">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:             #060607;
            --border:         rgba(255,255,255,0.07);
            --border-hover:   rgba(255,255,255,0.14);
            --text-primary:   #f0ede8;
            --text-secondary: rgba(240, 237, 232, 0.45);
            --text-tertiary:  rgba(240, 237, 232, 0.2);
            --accent:         #c8a96e;
            --mono:           'IBM Plex Mono', monospace;
        }
        html[data-theme="light"] {
            --bg:             #fafaf8;
            --border:         rgba(0,0,0,0.08);
            --border-hover:   rgba(0,0,0,0.16);
            --text-primary:   #18181a;
            --text-secondary: rgba(24, 24, 26, 0.5);
            --text-tertiary:  rgba(24, 24, 26, 0.28);
            --accent:         #9b7840;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--mono);
            font-weight: 300;
            display: flex;
            flex-direction: column;
            transition: background-color 0.35s ease, color 0.35s ease;
            cursor: default;
        }

        /* ─── Header ──────────────────────────────────── */
        .cv-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            height: 56px;
            border-bottom: 1px solid var(--border);
            transition: border-color 0.35s ease;
            gap: 1rem;
        }

        .back-link {
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .back-link:hover { color: var(--text-primary); }
        .back-arrow {
            font-size: 0.75rem;
            transition: transform 0.2s;
        }
        .back-link:hover .back-arrow { transform: translateX(-3px); }

        .cv-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.58rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            transition: color 0.35s;
            pointer-events: none;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Theme pill (same as main site) */
        .theme-pill {
            width: 32px;
            height: 18px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: none;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color 0.35s ease;
        }
        .theme-pill::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 3px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-tertiary);
            transform: translateY(-50%);
            transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1), background 0.35s ease;
        }
        html[data-theme="light"] .theme-pill            { border-color: var(--accent); }
        html[data-theme="light"] .theme-pill::before    {
            transform: translate(14px, -50%);
            background: var(--accent);
        }

        .header-divider {
            width: 1px;
            height: 14px;
            background: var(--border);
            transition: background 0.35s;
        }

        /* Download button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--bg);
            background: var(--accent);
            text-decoration: none;
            padding: 0.5rem 1rem;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .download-btn:hover { opacity: 0.85; }
        .download-icon { font-size: 0.7rem; }

        /* ─── PDF viewer ──────────────────────────────── */
        .cv-viewer {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .cv-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Fallback for browsers that don't render PDFs in iframes */
        .cv-fallback {
            display: none;
            position: absolute;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            text-align: center;
        }
        .cv-fallback.visible { display: flex; }

        .cv-fallback p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .cv-fallback a {
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            padding-bottom: 2px;
            border-bottom: 1px solid currentColor;
            transition: opacity 0.2s;
        }
        .cv-fallback a:hover { opacity: 0.7; }

        /* ─── Mobile ──────────────────────────────────── */
        @media (max-width: 600px) {
            .cv-header { padding: 0 1.25rem; }
            .cv-label { display: none; }
        }
    </style>
</head>
<body>

<header class="cv-header">
    <a href="/" class="back-link">
        <span class="back-arrow">←</span>
        <span>/qulad</span>
    </a>

    <span class="cv-label">Curriculum Vitae</span>

    <div class="header-right">
        <button class="theme-pill" id="btn-theme" aria-label="Toggle theme"></button>
        <div class="header-divider" aria-hidden="true"></div>
        <a href="/cv.pdf" download="Ahmet_Ertugrul_Kaya_CV.pdf" class="download-btn">
            <span>Download</span>
            <span class="download-icon">↓</span>
        </a>
    </div>
</header>

<main class="cv-viewer">
    <iframe
        class="cv-iframe"
        id="cv-iframe"
        src="/cv.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
        title="Ahmet Ertuğrul Kaya — CV"
    ></iframe>

    <div class="cv-fallback" id="cv-fallback">
        <p>PDF couldn't be displayed in this browser.<br>You can download it directly instead.</p>
        <a href="/cv.pdf" download="Ahmet_Ertugrul_Kaya_CV.pdf">Download CV</a>
    </div>
</main>

<script>
(function () {
    'use strict';

    /* ── Theme (sync with main site) ─────────────────── */
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        try { localStorage.setItem('ql-theme', theme); } catch (_) {}
    }

    (function init() {
        let saved = 'dark';
        try { saved = localStorage.getItem('ql-theme') || 'dark'; } catch (_) {}
        applyTheme(saved);

        // Also sync lang for html[lang]
        try {
            const lang = localStorage.getItem('ql-lang') || 'en';
            document.documentElement.lang = lang;
        } catch (_) {}
    })();

    document.getElementById('btn-theme').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    /* ── PDF fallback detection ───────────────────────── */
    // On mobile or unsupported browsers, show fallback after a short wait
    const iframe = document.getElementById('cv-iframe');
    const fallback = document.getElementById('cv-fallback');

    // iOS Safari doesn't render PDFs in iframes — detect and show fallback
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS) {
        iframe.style.display = 'none';
        fallback.classList.add('visible');
    }
})();
</script>
</body>
</html>
